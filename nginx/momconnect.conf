# MomConnect nginx configuration
# Copy to /etc/nginx/sites-available/momconnect and symlink to sites-enabled
# SSL certs via: certbot certonly --dns-... -d "*.sness.net" -d "sness.net"

# Note: sness.net root and *.sness.net are already handled by existing wwws config.
# These blocks are for when MomConnect gets its own domain, or for adding
# location blocks to the existing sness.net nginx config.

upstream mc_home    { server 127.0.0.1:4100; }
upstream mc_market  { server 127.0.0.1:4110; }
upstream mc_village { server 127.0.0.1:4120; }
upstream mc_launch  { server 127.0.0.1:4130; }
upstream mc_restore { server 127.0.0.1:4140; }
upstream mc_safe    { server 127.0.0.1:4150; }

# Market
server {
    listen 443 ssl http2;
    server_name market.sness.net;

    # ssl_certificate /etc/letsencrypt/live/sness.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sness.net/privkey.pem;

    location / {
        proxy_pass http://mc_market;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# Village
server {
    listen 443 ssl http2;

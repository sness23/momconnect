# MomConnect nginx configuration
# Copy to /etc/nginx/sites-available/momconnect and symlink to sites-enabled
# SSL certs via: certbot certonly --dns-... -d "*.sness.net" -d "sness.net"

upstream mc_home    { server 127.0.0.1:3000; }
upstream mc_market  { server 127.0.0.1:3010; }
upstream mc_village { server 127.0.0.1:3020; }
upstream mc_launch  { server 127.0.0.1:3030; }
upstream mc_restore { server 127.0.0.1:3040; }
upstream mc_safe    { server 127.0.0.1:3050; }

# Hub
server {
    listen 443 ssl http2;
    server_name sness.net;

    # ssl_certificate /etc/letsencrypt/live/sness.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sness.net/privkey.pem;

    location / {
        proxy_pass http://mc_home;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

